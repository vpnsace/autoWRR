<form action="/generate" method="POST">

    <label>Programmer Name</label>
    <input
        type="text"
        name="programmer_name"
        required
    >

    <br><br>

    <label>Theme</label>

    <select name="theme">
        <option value="1">VS DARK THEME</option>
        <option value="2">VS CODE LIGHT THEME</option>
        <option value="3">DEV C++ LIGHT THEME</option>
    </select>

    <br><br>

    <button type="submit">
        Generate PDF
    </button>

</form>
